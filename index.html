<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Desk Identity Lookup</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: Consolas, monospace;
  overflow: hidden;
}

/* ---------------- LOADER ---------------- */

#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #00ff00;
  font-size: 18px;
  z-index: 10;
}

/* Spinner */
.slds-spinner {
  position: relative;
  width: 60px;
  height: 60px;
  margin-bottom: 20px;
}

.slds-spinner div {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #00ff00;
  border-radius: 50%;
  opacity: 0.2;
  animation: fadeSpin 1.2s linear infinite;
}

.slds-spinner div:nth-child(1) { top: 0; left: 25px; animation-delay: 0s; }
.slds-spinner div:nth-child(2) { top: 8px; left: 42px; animation-delay: 0.15s; }
.slds-spinner div:nth-child(3) { top: 25px; left: 50px; animation-delay: 0.3s; }
.slds-spinner div:nth-child(4) { top: 42px; left: 42px; animation-delay: 0.45s; }
.slds-spinner div:nth-child(5) { top: 50px; left: 25px; animation-delay: 0.6s; }
.slds-spinner div:nth-child(6) { top: 42px; left: 8px; animation-delay: 0.75s; }
.slds-spinner div:nth-child(7) { top: 25px; left: 0; animation-delay: 0.9s; }
.slds-spinner div:nth-child(8) { top: 8px; left: 8px; animation-delay: 1.05s; }

@keyframes fadeSpin {
  0% { opacity: 1; }
  100% { opacity: 0.2; }
}

.loading-text {
  animation: blinkText 1.2s infinite;
}

@keyframes blinkText {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ---------------- TERMINAL ---------------- */

#terminal {
  padding: 20px;
  font-size: 18px;
  white-space: pre-wrap;
  line-height: 1.4;
  display: none;
  height: calc(100vh - 60px);
  overflow-y: auto;
}

.cursor {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 1s infinite;
}
.blinker {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.9s infinite;
}
.blinker1 {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.8s infinite;
}
.blinker2 {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.7s infinite;
}
.blinker3 {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.6s infinite;
}
.blinker4 {
  display: inline-block;
  width: 10px;
  background: #00ff00;
  animation: blink 0.5s infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ---------------- INPUT BOX ---------------- */

#inputContainer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: black;
  padding: 10px;
}

#commandInput {
  width: 100%;
  background: black;
  color: #00ff00;
  border: none;
  outline: none;
  font-family: Consolas;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
  <div class="slds-spinner">
    <div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div>
  </div>
  <div class="loading-text">Connecting to WILLSCOT Internal Network...</div>
</div>

<!-- Terminal -->
<div id="terminal"></div>

<!-- Input -->
<div id="inputContainer" style="display:none;">
  <input id="commandInput" placeholder="Type command... (try 'game')" />
</div>

<script>

const loader = document.getElementById("loader");
const terminal = document.getElementById("terminal");
const inputBox = document.getElementById("commandInput");
const inputContainer = document.getElementById("inputContainer");

/* ---------------- TERMINAL DATA ---------------- */

const lines = [
"",
"\nWILLSCOT Internal System v1.0",
"----------------------------------",
"",
"C:\\OfficeServer> scanning_desk --id=A07/014",
"Scanning workspace...",
"",
"C:\\OfficeServer> query_user --location_Pune_Office='A07/014'",
"Executing SOQL query...",
"",
"SELECT Name, Title, Role FROM Employee WHERE Desk__c = '014' AND Build__c = 'A07'",
"",
"✔ Details Found",
"",
"Name  : Shreeshwet Dhobale",
"Role  : Salesforce Developer",
"Email : shreeshwet.dhobale@willscot.com",
"Contact : 9324849093",
"",
"",
"C:\\OfficeServer> Process Complete.",
"",
"Tip: Type 'game' to play 🎮"
];

let lineIndex = 0;
let charIndex = 0;

/* ---------------- GAME STATE ---------------- */

let gameActive = false;
let secretNumber = 0;
let attempts = 0;

/* ---------------- START SEQUENCE ---------------- */

function startInitialBlinker(){
  loader.style.display = "none";
  terminal.style.display = "block";
  addCursor();
addInitialBlinker();
}
function addInitialBlinker() {
const cursor = document.createElement("span");
  cursor.classList.add("cursor");
  cursor.innerHTML = "_";
  terminal.appendChild(cursor);
  const blinker = document.createElement("span");
  blinker.classList.add("blinker");
  blinker.innerHTML = "_";
  terminal.appendChild(blinker);
   const blinker1 = document.createElement("span");
  blinker1.classList.add("blinker1");
  blinker1.innerHTML = "_";
  terminal.appendChild(blinker1);
   const blinker2 = document.createElement("span");
  blinker2.classList.add("blinker2");
  blinker2.innerHTML = "_";
  terminal.appendChild(blinker2);
   const blinker3 = document.createElement("span");
  blinker3.classList.add("blinker3");
  blinker3.innerHTML = "_";
  terminal.appendChild(blinker3);
   const blinker4 = document.createElement("span");
  blinker4.classList.add("blinker4");
  blinker4.innerHTML = "_";
  terminal.appendChild(blinker4);
}

setTimeout(startInitialBlinker, 3000);
setTimeout(startTerminal, 6000);
function startTerminal() {
  typeLine();
}

function typeLine() {
  if (lineIndex >= lines.length) {
    inputContainer.style.display = "block";
    inputBox.focus();
    return;
  }

  const currentLine = lines[lineIndex];

  if (charIndex < currentLine.length) {
    terminal.innerHTML += currentLine.charAt(charIndex);
    charIndex++;
    setTimeout(typeLine, 8);
  } else {
    terminal.innerHTML += "\n";
    lineIndex++;
    charIndex = 0;
    setTimeout(typeLine, 200);
  }

  terminal.scrollTop = terminal.scrollHeight;
}

/* ---------------- INPUT HANDLER ---------------- */

inputBox.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const input = inputBox.value.trim();
    terminal.innerHTML += "\n> " + input;
    inputBox.value = "";

    if (gameActive) {
      handleGameInput(input);
    } else {
      handleCommand(input);
    }

    terminal.scrollTop = terminal.scrollHeight;
  }
});

/* ---------------- COMMAND SYSTEM ---------------- */

function handleCommand(input) {
  switch(input.toLowerCase()) {

    case "game":
      startGame();
      break;

    case "help":
      print("\nCommands:");
      print("game  - Play guessing game");
      print("help  - Show commands");
      break;

    case "whoami":
      print("\nSalesforce Developer 😎");
      break;

    default:
      print("\nUnknown command. Try 'help'");
  }
}

/* ---------------- GAME ---------------- */

function startGame() {
  gameActive = true;
  secretNumber = Math.floor(Math.random() * 100) + 1;
  attempts = 0;

  print("\n🎮 GAME STARTED");
  print("Guess a number between 1 and 100");
  print("Type your guess...");
}

function handleGameInput(input) {

  if (input.toLowerCase() === "exit") {
    print("Game exited.");
    gameActive = false;
    return;
  }

  const guess = parseInt(input);

  if (isNaN(guess)) {
    print("⛔ Enter a valid number");
    return;
  }

  attempts++;

  if (guess === secretNumber) {
    print(`✅ Correct! Number was ${secretNumber}`);
    print(`🎯 Attempts: ${attempts}`);

    if (attempts <= 5) {
      print("🏆 Hacker level guessing!");
    } else if (attempts <= 10) {
      print("👏 Nice job!");
    } else {
      print("😅 That took a while!");
    }

    print("\nType 'game' to play again");
    gameActive = false;

  } else if (guess > secretNumber) {
    print("📉 Too high");
  } else {
    print("📈 Too low");
  }
}

/* ---------------- PRINT ---------------- */

function print(text) {
  terminal.innerHTML += "\n" + text;
}

/* ---------------- START ---------------- */

setTimeout(startInitialBlinker, 3000);
setTimeout(startTerminal, 6000);

</script>

</body>
</html>
